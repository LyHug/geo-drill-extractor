# LLM模型配置文件
# 包含所有LLM相关设置和API密钥

# 基础LLM配置
default_model: 'deepseek-r1-distill-qwen-32b-aliyun'
temperature: 0.1
max_tokens: 8192
timeout: 60
retry_times: 3

# API密钥配置 - 使用环境变量（安全起见，不在配置文件中存储真实密钥）
api_keys:
  deepseek-official: "${DEEPSEEK_API_KEY}"
  aliyun-bailian: "${ALIYUN_API_KEY}" 
  openrouter: "${OPENROUTER_API_KEY}"

# 各模型的特定配置
models:
  # GPT模型配置
  gpt:
    gpt-3.5-turbo:
      base_url: "https://openrouter.ai/api/v1"
      provider: "openrouter"
      max_tokens: 4096
    gpt-4o-mini:
      base_url: "https://openrouter.ai/api/v1"
      provider: "openrouter"
      max_tokens: 8192

  # DeepSeek模型配置
  deepseek:
    deepseek-v3:
      base_url: "https://api.deepseek.com/v1"
      provider: "deepseek-official"
      max_tokens: 8192
    deepseek-r1:
      base_url: "https://api.deepseek.com/v1"
      provider: "deepseek-official"
      max_tokens: 8192
    deepseek-r1-distill-qwen-32b-aliyun:
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      provider: "aliyun-bailian"
      max_tokens: 8192
    deepseek-r1-distill-qwen-14b-aliyun:
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      provider: "aliyun-bailian"
      max_tokens: 8192
    deepseek-r1-distill-qwen-7b-aliyun:
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      provider: "aliyun-bailian"
      max_tokens: 8192

  # Qwen模型配置
  qwen:
    qwen-max:
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      provider: "aliyun-bailian"
      max_tokens: 8192
    qwen3-32b:
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      provider: "aliyun-bailian"
      max_tokens: 8192
    qwq-32b:
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      provider: "aliyun-bailian"
      max_tokens: 32768

# 提示词说明
# - 实际运行使用的提示词位于：src/extraction/prompts.py
# - 为避免出现“配置文件提示词”和“代码提示词”不一致导致的复现歧义，本文件不再维护 prompt_templates 字段。

# 错误处理和重试配置
error_handling:
  max_retries: 3
  retry_delay: 1.0  # 秒
  backoff_factor: 2.0
  timeout_strategy: "exponential_backoff"
  
  # 可重试的错误类型
  retryable_errors:
    - "timeout"
    - "rate_limit"
    - "temporary_unavailable"
    - "connection_error"
    
  # 不可重试的错误类型
  non_retryable_errors:
    - "authentication_error" 
    - "invalid_api_key"
    - "quota_exceeded"
    - "model_not_found"

# 性能优化配置
performance:
  # 连接池配置
  connection_pool:
    max_connections: 20
    max_keepalive_connections: 5
    keepalive_expiry: 30
    
  # 并发控制
  concurrency:
    max_concurrent_requests: 10
    request_timeout: 60
    
  # 缓存配置
  response_cache:
    enabled: false
    max_size: 100
    ttl: 3600
